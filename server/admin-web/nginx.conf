server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  # Accept large APKs (up to ~256MB) on /api/v1/files/upload.
  client_max_body_size 256m;

  # Docker's embedded DNS lives at 127.0.0.11. Re-resolving every 10s means
  # that when a backend container is recreated (and gets a new IP), nginx
  # picks up the new IP automatically without needing an `nginx -s reload`
  # or a container restart of admin-web itself.
  #
  # IMPORTANT: a `resolver` directive only takes effect for `proxy_pass`
  # values that contain a *variable*. Static strings like
  # `proxy_pass http://device-service:8002` are resolved exactly once at
  # nginx startup and cached forever. Below, every upstream is therefore
  # captured into a `set $upstream_<svc> …` variable so each request goes
  # through the resolver.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # ----------------------------------------------------------------------------
  # API proxying.
  #
  # In production this would all flow through Traefik using PathPrefix routes
  # from compose labels. On this dev host Traefik's docker-client can't
  # negotiate the daemon API version (DOCKER_API_VERSION env-var isn't
  # honoured), so we route directly per service. The path prefixes mirror the
  # compose labels exactly — keep them in lockstep.
  # ----------------------------------------------------------------------------

  location /api/v1/auth {
    set $upstream_auth auth-service:8001;
    proxy_pass http://$upstream_auth;
    include /etc/nginx/conf.d/proxy.inc;
  }
  location /api/v1/devices {
    set $upstream_device device-service:8002;
    proxy_pass http://$upstream_device;
    include /etc/nginx/conf.d/proxy.inc;
  }
  location /api/v1/enroll {
    set $upstream_device device-service:8002;
    proxy_pass http://$upstream_device;
    include /etc/nginx/conf.d/proxy.inc;
  }
  location /api/v1/groups {
    set $upstream_device device-service:8002;
    proxy_pass http://$upstream_device;
    include /etc/nginx/conf.d/proxy.inc;
  }
  location /api/v1/policies {
    set $upstream_policy policy-service:8003;
    proxy_pass http://$upstream_policy;
    include /etc/nginx/conf.d/proxy.inc;
  }
  location /api/v1/commands {
    set $upstream_command command-service:8004;
    proxy_pass http://$upstream_command;
    include /etc/nginx/conf.d/proxy.inc;
  }
  location /api/v1/telemetry {
    set $upstream_telemetry telemetry-service:8005;
    proxy_pass http://$upstream_telemetry;
    include /etc/nginx/conf.d/proxy.inc;
  }
  location /api/v1/files {
    set $upstream_file file-service:8007;
    proxy_pass http://$upstream_file;
    include /etc/nginx/conf.d/proxy.inc;
  }
  location /api/v1/audit {
    set $upstream_audit audit-service:8008;
    proxy_pass http://$upstream_audit;
    include /etc/nginx/conf.d/proxy.inc;
  }

  # ----------------------------------------------------------------------------
  # MinIO same-origin proxy.
  #
  # Browser hits  http://<server>/mdm-files/<obj>?<presigned-sigv4>
  # nginx forwards to http://minio:9000/mdm-files/<obj>?<presigned-sigv4>
  # while PRESERVING Host header. file-service signs the URL with the same
  # Host the browser uses (via X-Forwarded-Host), so MinIO's SigV4 check
  # passes regardless of which network the admin is on.
  #
  # Static `mdm-files` here matches storage.DefaultBucket in file-service.
  # ----------------------------------------------------------------------------
  location /mdm-files/ {
    set $upstream_minio minio:9000;
    proxy_pass http://$upstream_minio;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_request_buffering off;
    proxy_buffering off;
  }

  location /ws {
    set $upstream_notif notification-service:8006;
    proxy_pass http://$upstream_notif;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400s;
  }
}
