server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # ----------------------------------------------------------------------------
  # API proxying.
  #
  # In production this would all flow through Traefik using PathPrefix routes
  # from compose labels. On this dev host Traefik's docker-client can't
  # negotiate the daemon API version (DOCKER_API_VERSION env-var isn't
  # honoured), so we route directly per service. The path prefixes mirror the
  # compose labels exactly — keep them in lockstep.
  # ----------------------------------------------------------------------------

  location /api/v1/auth      { proxy_pass http://auth-service:8001; include /etc/nginx/conf.d/proxy.inc; }
  location /api/v1/devices   { proxy_pass http://device-service:8002; include /etc/nginx/conf.d/proxy.inc; }
  location /api/v1/enroll    { proxy_pass http://device-service:8002; include /etc/nginx/conf.d/proxy.inc; }
  location /api/v1/policies  { proxy_pass http://policy-service:8003; include /etc/nginx/conf.d/proxy.inc; }
  location /api/v1/commands  { proxy_pass http://command-service:8004; include /etc/nginx/conf.d/proxy.inc; }
  location /api/v1/telemetry { proxy_pass http://telemetry-service:8005; include /etc/nginx/conf.d/proxy.inc; }
  location /api/v1/files     { proxy_pass http://file-service:8007; include /etc/nginx/conf.d/proxy.inc; }
  location /api/v1/audit     { proxy_pass http://audit-service:8008; include /etc/nginx/conf.d/proxy.inc; }

  location /ws {
    proxy_pass http://notification-service:8006;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400s;
  }
}
