# mosquitto.conf for MDM
# Devices: TLS in production (omitted for compose dev).
# Services authenticate with username/password; devices authenticate with a
# device-id username + JWT-derived password (handled by an auth plugin in
# production; left as static creds for local dev).

listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/

# Per-client message expiry (matches command timeout).
message_size_limit 1048576
max_keepalive 120

# WebSocket listener for browser-based debug clients.
listener 9001
protocol websockets
