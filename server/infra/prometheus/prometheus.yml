global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: mdm-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:9100
          - device-service:9100
          - policy-service:9100
          - command-service:9100
          - telemetry-service:9100
          - notification-service:9100
          - file-service:9100
          - audit-service:9100

  - job_name: traefik
    static_configs:
      - targets: ["traefik:8080"]
