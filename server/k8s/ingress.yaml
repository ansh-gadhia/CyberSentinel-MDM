apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mdm
  namespace: mdm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/proxy-body-size: "256m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [mdm.example.com]
      secretName: mdm-tls
  rules:
    - host: mdm.example.com
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend: { service: { name: auth-service, port: { number: 8001 } } }
          - path: /api/v1/devices
            pathType: Prefix
            backend: { service: { name: device-service, port: { number: 8002 } } }
          - path: /api/v1/enroll
            pathType: Prefix
            backend: { service: { name: device-service, port: { number: 8002 } } }
          - path: /api/v1/policies
            pathType: Prefix
            backend: { service: { name: policy-service, port: { number: 8003 } } }
          - path: /api/v1/commands
            pathType: Prefix
            backend: { service: { name: command-service, port: { number: 8004 } } }
          - path: /api/v1/telemetry
            pathType: Prefix
            backend: { service: { name: telemetry-service, port: { number: 8005 } } }
          - path: /api/v1/files
            pathType: Prefix
            backend: { service: { name: file-service, port: { number: 8007 } } }
          - path: /api/v1/audit
            pathType: Prefix
            backend: { service: { name: audit-service, port: { number: 8008 } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: notification-service, port: { number: 8006 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: admin-web, port: { number: 80 } } }
