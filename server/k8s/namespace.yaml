apiVersion: v1
kind: Namespace
metadata:
  name: mdm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mdm-config
  namespace: mdm
data:
  ENV: production
  LOG_LEVEL: info
  REDIS_ADDR: redis:6379
  NATS_URL: nats://nats:4222
  MQTT_BROKER: tcp://mosquitto:1883
  MINIO_ENDPOINT: minio:9000
  PUBLIC_BASE_URL: https://mdm.example.com
  JWT_ACCESS_TTL: "15m"
  JWT_REFRESH_TTL: "168h"
---
apiVersion: v1
kind: Secret
metadata:
  name: mdm-secrets
  namespace: mdm
type: Opaque
stringData:
  POSTGRES_DSN: postgres://mdm:CHANGE_ME@postgres:5432/mdm?sslmode=disable
  JWT_SECRET: REPLACE_WITH_32_BYTE_RANDOM_KEY_xxxxxxxxxxxxxxxxxxxxxxx
  MQTT_USER: mdm
  MQTT_PASS: REPLACE_ME
  MINIO_ACCESS_KEY: REPLACE_ME
  MINIO_SECRET_KEY: REPLACE_ME
