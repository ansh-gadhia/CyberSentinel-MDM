# Horizontal Pod Autoscalers — start with the highest-load services.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: command-service, namespace: mdm }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: command-service }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: telemetry-service, namespace: mdm }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: telemetry-service }
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
