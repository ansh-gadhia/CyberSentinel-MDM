# All MDM microservice Deployments + Services. Each Deployment shares the same
# ConfigMap + Secret. Replace `image:` with your registry path before applying.
#
# Resource requests are conservative starting points; tune via HPA in prod.

apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: mdm }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/mdm/auth-service:latest
          ports: [{ containerPort: 8001 }, { name: metrics, containerPort: 9100 }]
          envFrom:
            - configMapRef: { name: mdm-config }
            - secretRef:    { name: mdm-secrets }
          env: [{ name: SERVICE_NAME, value: auth-service }, { name: HTTP_PORT, value: "8001" }]
          readinessProbe: { httpGet: { path: /healthz, port: 8001 }, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8001 }, periodSeconds: 15, initialDelaySeconds: 20 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: mdm }
spec:
  selector: { app: auth-service }
  ports:
    - { name: http, port: 8001 }
    - { name: metrics, port: 9100 }
---
